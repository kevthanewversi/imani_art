<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imani — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #1C1917; --soft:   #44403C; --muted:  #78716C;
    --cream:  #F6F0E4; --paper:  #EDE6D4; --white:  #FDFAF4;
    --border: rgba(28,25,23,0.12);
    --sienna: #B45309; --sn-bg:  #FEF3C7;
    --green:  #166534; --gn-bg:  #DCFCE7;
    --red:    #991B1B; --rd-bg:  #FEE2E2;
    --serif:  'Cormorant Garamond',Georgia,serif;
    --sans:   'Outfit',system-ui,sans-serif;
    --sw: 230px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:var(--sans);font-weight:300;color:var(--ink);background:var(--cream);display:flex;-webkit-font-smoothing:antialiased;}

  /* ── LOGIN ── */
  #login{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity 0.3s;}
  #login.hide{opacity:0;pointer-events:none;}
  .login-box{background:var(--white);padding:3rem 2.5rem;width:380px;max-width:90vw;}
  .login-logo{font-family:var(--serif);font-size:2rem;font-weight:300;margin-bottom:0.25rem;}
  .login-logo em{font-style:italic;color:var(--sienna);}
  .login-sub{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2.5rem;}
  .login-label{font-size:0.68rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.4rem;}
  .login-input{width:100%;font-family:var(--sans);font-size:0.95rem;color:var(--ink);background:transparent;border:none;border-bottom:1px solid rgba(28,25,23,0.2);padding:0.5rem 0;outline:none;transition:border-color 0.2s;margin-bottom:2rem;}
  .login-input:focus{border-color:var(--sienna);}
  .login-btn{width:100%;font-family:var(--sans);font-size:0.75rem;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;color:var(--white);background:var(--ink);border:1px solid var(--ink);padding:0.9rem;cursor:pointer;transition:all 0.2s;}
  .login-btn:hover{background:transparent;color:var(--ink);}
  .login-err{font-size:0.78rem;color:var(--red);margin-top:0.75rem;min-height:1rem;}

  /* ── SIDEBAR ── */
  aside{width:var(--sw);min-height:100vh;background:var(--ink);display:flex;flex-direction:column;padding:1.75rem 0;flex-shrink:0;}
  .sb-brand{padding:0 1.5rem 1.75rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1.25rem;}
  .sb-brand-name{font-family:var(--serif);font-size:1.2rem;font-weight:300;color:#F6F0E4;}
  .sb-brand-name em{font-style:italic;color:#D97706;}
  .sb-brand-sub{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(246,240,228,0.3);margin-top:0.15rem;}
  .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1.5rem;font-size:0.8rem;font-weight:400;letter-spacing:0.03em;color:rgba(246,240,228,0.5);cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;}
  .nav-item:hover{color:#F6F0E4;background:rgba(255,255,255,0.05);}
  .nav-item.active{color:#F6F0E4;border-left-color:#D97706;background:rgba(217,119,6,0.1);}
  .nav-item svg{opacity:0.65;flex-shrink:0;}
  .nav-item.active svg{opacity:1;}
  .nav-divider{height:1px;background:rgba(255,255,255,0.07);margin:1rem 0;}
  .nav-section{font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(246,240,228,0.25);padding:0.9rem 1.5rem 0.3rem;}
  .sb-footer{margin-top:auto;padding:1.25rem 1.5rem 0;border-top:1px solid rgba(255,255,255,0.07);}
  .sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
  .sb-stat{background:rgba(255,255,255,0.05);border-radius:3px;padding:0.55rem 0.7rem;}
  .sb-stat-val{font-family:var(--serif);font-size:1.25rem;font-weight:300;color:#F6F0E4;}
  .sb-stat-lbl{font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(246,240,228,0.3);}

  /* ── MAIN ── */
  main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.25rem;border-bottom:1px solid var(--border);background:var(--cream);flex-shrink:0;}
  .topbar-title{font-family:var(--serif);font-size:1.5rem;font-weight:300;font-style:italic;}
  .topbar-actions{display:flex;gap:0.65rem;align-items:center;}
  .content{flex:1;overflow-y:auto;padding:1.75rem 2.25rem;}

  /* ── BUTTONS ── */
  .btn{font-family:var(--sans);font-size:0.72rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;padding:0.55rem 1.3rem;cursor:pointer;border-radius:2px;transition:all 0.18s;display:inline-flex;align-items:center;gap:0.45rem;}
  .btn-dark{background:var(--ink);color:#F6F0E4;border:1px solid var(--ink);}
  .btn-dark:hover{background:#374151;}
  .btn-outline{background:transparent;color:var(--soft);border:1px solid var(--border);}
  .btn-outline:hover{border-color:var(--ink);color:var(--ink);}
  .btn-sienna{background:var(--sienna);color:#fff;border:1px solid var(--sienna);}
  .btn-sienna:hover{background:#92400E;}
  .btn-red{background:transparent;color:var(--red);border:1px solid #FECACA;}
  .btn-red:hover{background:var(--rd-bg);}

  /* ── FILTER BAR ── */
  .filter-bar{display:flex;gap:0.4rem;margin-bottom:1.75rem;align-items:center;flex-wrap:wrap;}
  .filter-btn{font-family:var(--sans);font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.38rem 0.9rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:1px;transition:all 0.15s;}
  .filter-btn:hover,.filter-btn.active{background:var(--ink);color:#F6F0E4;border-color:var(--ink);}
  .filter-sep{flex:1;}
  .search-wrap{position:relative;display:flex;align-items:center;}
  .search-wrap svg{position:absolute;left:9px;color:var(--muted);pointer-events:none;}
  .search-input{font-family:var(--sans);font-size:0.8rem;padding:0.42rem 0.75rem 0.42rem 2rem;border:1px solid var(--border);background:transparent;color:var(--ink);border-radius:2px;outline:none;width:190px;transition:border-color 0.2s;}
  .search-input:focus{border-color:var(--sienna);}

  /* ── GRID ── */
  .paintings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem;}
  .pcard{background:var(--white);border:1px solid var(--border);border-radius:2px;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s;cursor:pointer;}
  .pcard:hover{box-shadow:0 6px 24px rgba(28,25,23,0.09);transform:translateY(-2px);}
  .pcard-img{width:100%;aspect-ratio:4/5;overflow:hidden;background:var(--paper);position:relative;}
  .pcard-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .pcard-img .ph{width:100%;height:100%;}
  .status-pill{position:absolute;top:0.6rem;right:0.6rem;font-size:0.58rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:0.22rem 0.55rem;border-radius:2px;}
  .sp-draft{background:#F3F4F6;color:#6B7280;}
  .sp-live{background:var(--gn-bg);color:var(--green);}
  .sp-sold{background:var(--rd-bg);color:var(--red);}
  .pcard-body{padding:0.85rem 0.95rem;}
  .pcard-title{font-family:var(--serif);font-size:1.05rem;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pcard-meta{font-size:0.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:0.15rem;}
  .pcard-footer{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0.95rem;border-top:1px solid var(--border);}
  .pcard-price{font-family:var(--serif);font-size:1.05rem;font-weight:300;}
  .pcard-actions{display:flex;gap:0.35rem;}
  .icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;border-radius:2px;cursor:pointer;color:var(--muted);transition:all 0.15s;flex-shrink:0;}
  .icon-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--paper);}
  .icon-btn.ib-publish:hover{border-color:#FED7AA;color:var(--sienna);background:var(--sn-bg);}
  .icon-btn.ib-del:hover{border-color:#FECACA;color:var(--red);background:var(--rd-bg);}
  .icon-btn.ib-sold:hover{border-color:var(--gn-bg);color:var(--green);background:var(--gn-bg);}

  /* ── EMPTY ── */
  .empty-state{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--muted);}
  .empty-title{font-family:var(--serif);font-size:1.3rem;font-style:italic;color:var(--soft);margin:1rem 0 0.4rem;}
  .empty-body{font-size:0.85rem;line-height:1.7;}

  /* ── DRAWER ── */
  .overlay{position:fixed;inset:0;background:rgba(28,25,23,0.5);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:460px;max-width:100vw;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(32px);transition:transform 0.3s cubic-bezier(0.22,1,0.36,1);z-index:301;overflow-y:auto;}
  .overlay.open .drawer{transform:translateX(0);}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 1.75rem;border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;background:var(--white);z-index:1;}
  .drawer-title{font-family:var(--serif);font-size:1.2rem;font-weight:300;font-style:italic;}
  .drawer-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;border-radius:2px;cursor:pointer;color:var(--muted);transition:all 0.15s;}
  .drawer-close:hover{border-color:var(--ink);color:var(--ink);}
  .drawer-body{padding:1.75rem;flex:1;}
  .drawer-footer{padding:1.25rem 1.75rem;border-top:1px solid var(--border);display:flex;gap:0.65rem;justify-content:flex-end;position:sticky;bottom:0;background:var(--white);}

  /* ── DROPZONE ── */
  .dz{border:1.5px dashed rgba(28,25,23,0.22);border-radius:3px;padding:2.25rem 1.25rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;background:var(--paper);margin-bottom:1.4rem;}
  .dz:hover,.dz.drag{border-color:var(--sienna);background:var(--sn-bg);}
  .dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .dz-label{font-size:0.82rem;color:var(--soft);line-height:1.6;}
  .dz-hint{font-size:0.68rem;color:var(--muted);margin-top:0.3rem;}
  .dz-preview{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:2px;display:none;}

  /* ── FORM ── */
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .fg{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1.1rem;}
  .fg.span2{grid-column:span 2;}
  .fl{font-size:0.65rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
  .fi{font-family:var(--sans);font-size:0.88rem;color:var(--ink);background:transparent;border:none;border-bottom:1px solid rgba(28,25,23,0.18);padding:0.48rem 0;outline:none;transition:border-color 0.2s;width:100%;}
  .fi:focus{border-color:var(--sienna);}
  .fi.ta{resize:vertical;min-height:75px;line-height:1.6;}
  .fi.sel{cursor:pointer;}

  /* ── SETTINGS PAGE ── */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem 2.5rem;}
  .settings-section{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:1.5rem;}
  .settings-section-title{font-family:var(--serif);font-size:1.1rem;font-style:italic;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
  .settings-section.full{grid-column:1/-1;}
  .save-settings-bar{position:sticky;bottom:0;background:rgba(246,240,228,0.95);backdrop-filter:blur(8px);padding:1rem 0;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.65rem;margin-top:1.5rem;}

  /* ── TOAST ── */
  .toast-stack{position:fixed;bottom:1.25rem;right:1.25rem;z-index:999;display:flex;flex-direction:column;gap:0.4rem;pointer-events:none;}
  .toast{background:var(--ink);color:#F6F0E4;font-size:0.78rem;padding:0.65rem 1.1rem;border-radius:2px;display:flex;align-items:center;gap:0.5rem;animation:toastIn 0.25s ease;max-width:300px;}
  .toast.ok{background:#14532D;}
  .toast.err{background:#7F1D1D;}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .dot-green{background:#22C55E;} .dot-amber{background:#F59E0B;} .dot-red{background:#EF4444;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{width:13px;height:13px;border:2px solid rgba(246,240,228,0.3);border-top-color:#F6F0E4;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}

  /* ── PLACEHOLDER COLORS ── */
  .ph0{background:radial-gradient(ellipse at 35% 55%, #C2703A 0%, #7C3D12 45%, #1C0D05 100%);}
  .ph1{background:linear-gradient(145deg, #2C5F4A 0%, #1A3D2A 40%, #4A8A6A 70%);}
  .ph2{background:radial-gradient(ellipse at 55% 45%, #7B4A8B 0%, #3D1E50 50%);}
  .ph3{background:linear-gradient(160deg, #C4A265 0%, #8B6914 50%);}
  .ph4{background:radial-gradient(ellipse at 40% 60%, #C2703A 0%, #3D1C08 60%);}
  .ph5{background:radial-gradient(ellipse at 30% 40%, #4A3B6B 0%, #1E1535 60%);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">I<em>mani</em></div>
    <div class="login-sub">Studio Dashboard</div>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="pw-input" placeholder="Enter admin password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Enter Studio</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- SIDEBAR -->
<aside>
  <div class="sb-brand">
    <div class="sb-brand-name">I<em>mani</em></div>
    <div class="sb-brand-sub">Admin Dashboard</div>
  </div>
  <nav>
    <div class="nav-item active" id="nav-paintings" onclick="showView('paintings')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 9 4-4 4 4 4-4 4 4"/><path d="m3 15 4 4 4-4 4 4 4-4"/></svg>
      All Paintings
    </div>
    <div class="nav-item" id="nav-settings" onclick="showView('settings')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Site Settings
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">Quick Links</div>
    <div class="nav-item" onclick="window.open('/', '_blank')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      View Site ↗
    </div>
    <div class="nav-item" onclick="openShopify()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Shopify Admin ↗
    </div>
    <div class="nav-item" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log Out
    </div>
  </nav>
  <div class="sb-footer">
    <div class="sb-stats">
      <div class="sb-stat"><div class="sb-stat-val" id="s-total">—</div><div class="sb-stat-lbl">Total</div></div>
      <div class="sb-stat"><div class="sb-stat-val" id="s-live">—</div><div class="sb-stat-lbl">Live</div></div>
      <div class="sb-stat"><div class="sb-stat-val" id="s-sold">—</div><div class="sb-stat-lbl">Sold</div></div>
      <div class="sb-stat"><div class="sb-stat-val" id="s-rev">—</div><div class="sb-stat-lbl">Revenue</div></div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main>
  <div class="topbar">
    <h1 class="topbar-title" id="page-title">All Paintings</h1>
    <div class="topbar-actions" id="topbar-actions">
      <button class="btn btn-outline" onclick="loadPaintings()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
      <button class="btn btn-dark" onclick="openDrawer()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Painting
      </button>
    </div>
  </div>

  <!-- PAINTINGS VIEW -->
  <div class="content" id="view-paintings">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('draft',this)">Draft</button>
      <button class="filter-btn" onclick="setFilter('live',this)">Live</button>
      <button class="filter-btn" onclick="setFilter('sold',this)">Sold</button>
      <span class="filter-sep"></span>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Search…" oninput="renderGrid()">
      </div>
    </div>
    <div class="paintings-grid" id="grid"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="content" id="view-settings" style="display:none">
    <div class="settings-grid" id="settings-grid"></div>
  </div>
</main>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawerOnBg(event)">
  <div class="drawer">
    <div class="drawer-header">
      <span class="drawer-title" id="drawer-title">Add New Painting</span>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <div class="dz" id="dz">
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" onchange="previewFile(this)">
        <svg style="color:var(--muted);margin:0 auto 0.6rem;display:block" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p class="dz-label">Drop image here or click to browse</p>
        <p class="dz-hint">JPEG · PNG · WebP · Max 30 MB</p>
        <img id="dz-preview" class="dz-preview" alt="">
      </div>
      <div class="form-row">
        <div class="fg"><label class="fl">Title *</label><input class="fi" type="text" id="f-title" placeholder="Golden Hours"></div>
        <div class="fg"><label class="fl">Year</label><input class="fi" type="text" id="f-year"></div>
        <div class="fg"><label class="fl">Medium</label><input class="fi" type="text" id="f-medium" placeholder="Oil on linen"></div>
        <div class="fg"><label class="fl">Dimensions</label><input class="fi" type="text" id="f-dims" placeholder="120 × 90 cm"></div>
        <div class="fg"><label class="fl">Price (£) *</label><input class="fi" type="number" id="f-price" min="0" placeholder="2800"></div>
        <div class="fg"><label class="fl">Publish</label>
          <select class="fi sel" id="f-status">
            <option value="draft">Save as Draft</option>
            <option value="live">Publish Now</option>
          </select>
        </div>
        <div class="fg span2"><label class="fl">Description</label><textarea class="fi ta" id="f-desc" placeholder="A note about this piece…"></textarea></div>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-outline" onclick="closeDrawer()">Cancel</button>
      <button class="btn btn-dark" id="save-btn" onclick="savePainting()">
        <span class="spin" id="save-spin"></span>
        <span id="save-lbl">Save Painting</span>
      </button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-stack" id="toasts"></div>

<script>
const API = '';  // same origin
let token = localStorage.getItem('studio_token') || '';
let paintings = [];
let activeFilter = 'all';
let editingId = null;

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('f-year').value = new Date().getFullYear();
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  if (token) {
    const r = await fetch('/api/auth/verify', { headers: auth() });
    const d = await r.json().catch(() => ({}));
    if (d.valid) {
      hideLock();
      loadPaintings();
      loadSettingsView();
      setupDragDrop();
    } else {
      token = '';
    }
  }
});

// ── AUTH ──────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  document.getElementById('login-err').textContent = '';
  try {
    const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Wrong password');
    token = d.token;
    localStorage.setItem('studio_token', token);
    hideLock();
    loadPaintings();
    loadSettingsView();
    setupDragDrop();
  } catch (e) {
    document.getElementById('login-err').textContent = e.message;
  }
}

function auth() { return { Authorization: `Bearer ${token}` }; }
function hideLock() { document.getElementById('login').classList.add('hide'); }
function logout() { localStorage.removeItem('studio_token'); location.reload(); }

// ── VIEWS ─────────────────────────────────────────────────
function showView(v) {
  ['paintings','settings'].forEach(n => {
    document.getElementById(`view-${n}`).style.display = n === v ? '' : 'none';
    document.getElementById(`nav-${n}`).classList.toggle('active', n === v);
  });
  const titles = { paintings:'All Paintings', settings:'Site Settings' };
  document.getElementById('page-title').textContent = titles[v];
  const actions = document.getElementById('topbar-actions');
  actions.style.display = v === 'paintings' ? '' : 'none';
}

// ── PAINTINGS ─────────────────────────────────────────────
async function loadPaintings() {
  try {
    const r = await fetch('/api/paintings', { headers: auth() });
    const d = await r.json();
    paintings = d.paintings || [];
  } catch { paintings = []; }
  renderGrid();
  updateStats();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const q = (document.querySelector('.search-input')?.value || '').toLowerCase();
  const filtered = paintings.filter(p => {
    const matchFilter = activeFilter === 'all' || p.status === activeFilter;
    const matchSearch = !q || p.title.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><svg style="opacity:0.2;margin:0 auto 1rem;display:block" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p class="empty-title">${activeFilter==='all'?'No paintings yet':'No '+activeFilter+' paintings'}</p><p class="empty-body">${activeFilter==='all'?'Click Add Painting to upload your first work.':''}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => {
    const img = p.image_url
      ? `<img src="${p.image_url}" alt="${p.title}" loading="lazy">`
      : `<div class="ph ph${i % 6}"></div>`;
    const publishBtn = p.status === 'draft'
      ? `<button class="icon-btn ib-publish" title="Publish" onclick="event.stopPropagation();publishPainting(${p.id})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg></button>` : '';
    const soldBtn = p.status === 'live'
      ? `<button class="icon-btn ib-sold" title="Mark Sold" onclick="event.stopPropagation();markSold(${p.id})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></button>` : '';
    const shopifyLink = p.shopify_url
      ? `<button class="icon-btn" title="View on Shopify" onclick="event.stopPropagation();window.open('${p.shopify_url}','_blank')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>` : '';
    return `
      <div class="pcard" onclick="openDrawer(${p.id})">
        <div class="pcard-img">${img}<span class="status-pill sp-${p.status}">${p.status}</span></div>
        <div class="pcard-body">
          <div class="pcard-title">${p.title}</div>
          <div class="pcard-meta">${[p.medium,p.dimensions,p.year].filter(Boolean).join(' · ') || '—'}</div>
        </div>
        <div class="pcard-footer">
          <span class="pcard-price">£${Number(p.price).toLocaleString()}</span>
          <div class="pcard-actions">
            ${publishBtn}${soldBtn}${shopifyLink}
            <button class="icon-btn" title="Edit" onclick="event.stopPropagation();openDrawer(${p.id})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="icon-btn ib-del" title="Delete" onclick="event.stopPropagation();deletePainting(${p.id})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function updateStats() {
  const live = paintings.filter(p => p.status === 'live').length;
  const sold = paintings.filter(p => p.status === 'sold').length;
  const rev  = paintings.filter(p => p.status === 'sold').reduce((s,p) => s + parseFloat(p.price||0), 0);
  document.getElementById('s-total').textContent = paintings.length;
  document.getElementById('s-live').textContent  = live;
  document.getElementById('s-sold').textContent  = sold;
  document.getElementById('s-rev').textContent   = rev >= 1000 ? `£${(rev/1000).toFixed(1)}k` : `£${rev}`;
}

// ── ACTIONS ───────────────────────────────────────────────
async function publishPainting(id) {
  setBtnLoading(true);
  try {
    const r = await fetch(`/api/paintings/${id}/publish`, { method:'POST', headers: auth() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    await loadPaintings();
    toast(d.shopify ? '🚀 Published to Shopify!' : '✓ Published (no Shopify configured)', 'ok');
  } catch (e) { toast(e.message, 'err'); }
  setBtnLoading(false);
}

async function markSold(id) {
  if (!confirm('Mark this painting as sold? This will also update Shopify inventory.')) return;
  try {
    const r = await fetch(`/api/paintings/${id}/sold`, { method:'POST', headers: auth() });
    if (!r.ok) throw new Error((await r.json()).error);
    await loadPaintings();
    toast('Marked as sold', 'ok');
  } catch (e) { toast(e.message, 'err'); }
}

async function deletePainting(id) {
  if (!confirm('Delete this painting? This cannot be undone.')) return;
  try {
    const r = await fetch(`/api/paintings/${id}`, { method:'DELETE', headers: auth() });
    if (!r.ok) throw new Error((await r.json()).error);
    await loadPaintings();
    toast('Deleted');
  } catch (e) { toast(e.message, 'err'); }
}

// ── DRAWER ────────────────────────────────────────────────
function openDrawer(id = null) {
  editingId = id;
  document.getElementById('drawer-title').textContent = id ? 'Edit Painting' : 'Add New Painting';
  document.getElementById('save-lbl').textContent = id ? 'Save Changes' : 'Save Painting';

  if (id) {
    const p = paintings.find(x => x.id === id);
    if (p) {
      set('f-title', p.title); set('f-year', p.year); set('f-medium', p.medium);
      set('f-dims', p.dimensions); set('f-price', p.price); set('f-desc', p.description);
      document.getElementById('f-status').value = p.status === 'sold' ? 'draft' : p.status;
    }
  } else {
    ['f-title','f-medium','f-dims','f-price','f-desc'].forEach(id => set(id, ''));
    set('f-year', new Date().getFullYear());
    document.getElementById('file-input').value = '';
    resetPreview();
    document.getElementById('f-status').value = 'draft';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
  resetSaveBtn();
}

function closeDrawerOnBg(e) { if (e.target === document.getElementById('overlay')) closeDrawer(); }

async function savePainting() {
  const title = document.getElementById('f-title').value.trim();
  const price = document.getElementById('f-price').value;
  const file  = document.getElementById('file-input').files[0];
  const status = document.getElementById('f-status').value;

  if (!title) return toast('Title is required', 'err');
  if (!price)  return toast('Price is required', 'err');
  if (!file && !editingId) return toast('Please select an image', 'err');

  setSaving(true);

  try {
    let paintingId = editingId;

    if (!editingId) {
      // Create with image
      const fd = new FormData();
      fd.append('title', title);
      fd.append('medium', document.getElementById('f-medium').value);
      fd.append('dimensions', document.getElementById('f-dims').value);
      fd.append('price', price);
      fd.append('year', document.getElementById('f-year').value);
      fd.append('description', document.getElementById('f-desc').value);
      fd.append('image', file);
      const r = await fetch('/api/paintings', { method:'POST', headers: auth(), body: fd });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      paintingId = d.painting.id;
    } else {
      // Update fields only
      const body = {
        title,
        medium:      document.getElementById('f-medium').value,
        dimensions:  document.getElementById('f-dims').value,
        price:       parseFloat(price),
        year:        document.getElementById('f-year').value,
        description: document.getElementById('f-desc').value,
      };
      const r = await fetch(`/api/paintings/${editingId}`, { method:'PUT', headers: { ...auth(), 'Content-Type':'application/json' }, body: JSON.stringify(body) });
      if (!r.ok) throw new Error((await r.json()).error);
    }

    // Publish if requested
    if (status === 'live') {
      const r = await fetch(`/api/paintings/${paintingId}/publish`, { method:'POST', headers: auth() });
      if (!r.ok) {
        const d = await r.json();
        toast(`Saved but publish failed: ${d.error}`, 'err');
      }
    }

    closeDrawer();
    await loadPaintings();
    toast(editingId ? 'Painting updated' : 'Painting saved', 'ok');
  } catch (e) {
    toast(e.message, 'err');
  } finally {
    setSaving(false);
  }
}

// ── SETTINGS ──────────────────────────────────────────────
let settingsData = {};

async function loadSettingsView() {
  try {
    const r = await fetch('/api/settings');
    settingsData = await r.json();
    renderSettingsForm();
  } catch { toast('Could not load settings', 'err'); }
}

const SETTINGS_FIELDS = [
  { section: 'Studio Identity', fields: [
    { key: 'studio_name',   label: 'Studio Name',    hint: 'Shown in nav and browser tab' },
    { key: 'artist_name',   label: 'Artist Name' },
    { key: 'tagline',       label: 'Tagline',         full: true },
    { key: 'hero_subtitle', label: 'Hero paragraph',  full: true, type: 'textarea' },
  ]},
  { section: 'About You', fields: [
    { key: 'location',       label: 'Location' },
    { key: 'medium_primary', label: 'Primary Medium' },
    { key: 'originals_sold', label: 'Originals Sold' },
    { key: 'commissions',    label: 'Commissions' },
    { key: 'bio_intro',      label: 'Bio Intro',       full: true },
    { key: 'bio_body',       label: 'Full Bio',         full: true, type: 'textarea' },
  ]},
  { section: 'Contact & Social', fields: [
    { key: 'email',         label: 'Email' },
    { key: 'instagram',     label: 'Instagram Handle' },
    { key: 'instagram_url', label: 'Instagram URL' },
    { key: 'tiktok',        label: 'TikTok Handle' },
    { key: 'tiktok_url',    label: 'TikTok URL' },
    { key: 'pinterest',     label: 'Pinterest Handle' },
    { key: 'pinterest_url', label: 'Pinterest URL' },
    { key: 'shipping_info', label: 'Shipping Info',   full: true },
  ]},
  { section: 'Shopify Integration', fullSection: true, fields: [
    { key: 'SHOPIFY_NOTE', label: '', type: 'note', text: 'Shopify credentials are set in your .env file on the server, not here (for security). See README for instructions. Once configured, use the Publish button on each painting to sync it to Shopify.' },
  ]},
];

function renderSettingsForm() {
  const grid = document.getElementById('settings-grid');
  grid.innerHTML = SETTINGS_FIELDS.map(sec => `
    <div class="settings-section${sec.fullSection?' full':''}">
      <div class="settings-section-title">${sec.section}</div>
      <div class="${sec.fullSection ? '' : 'form-row'}">
        ${sec.fields.map(f => {
          if (f.type === 'note') return `<p style="font-size:0.85rem;line-height:1.7;color:var(--muted)">${f.text}</p>`;
          const val = (settingsData[f.key] || '').replace(/"/g, '&quot;');
          const cls = f.full ? 'fg span2' : 'fg';
          const input = f.type === 'textarea'
            ? `<textarea class="fi ta" id="s-${f.key}" rows="4">${settingsData[f.key]||''}</textarea>`
            : `<input class="fi" type="text" id="s-${f.key}" value="${val}">`;
          return `<div class="${cls}"><label class="fl">${f.label}</label>${input}</div>`;
        }).join('')}
      </div>
    </div>
  `).join('') + `
    <div class="settings-section full" style="background:transparent;border:none;padding:0">
      <div class="save-settings-bar">
        <button class="btn btn-outline" onclick="loadSettingsView()">Discard Changes</button>
        <button class="btn btn-dark" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>`;
}

async function saveSettings() {
  const body = {};
  SETTINGS_FIELDS.forEach(sec => sec.fields.forEach(f => {
    if (f.type === 'note') return;
    const el = document.getElementById(`s-${f.key}`);
    if (el) body[f.key] = el.value;
  }));
  try {
    const r = await fetch('/api/settings', { method:'PUT', headers: { ...auth(), 'Content-Type':'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) throw new Error('Save failed');
    settingsData = await r.json();
    toast('Settings saved — refresh the site to see changes', 'ok');
  } catch (e) { toast(e.message, 'err'); }
}

// ── UTILS ─────────────────────────────────────────────────
function previewFile(input) {
  const file = input.files[0];
  if (!file) return;
  const dz = document.getElementById('dz');
  const prev = document.getElementById('dz-preview');
  prev.src = URL.createObjectURL(file);
  prev.style.display = 'block';
  dz.querySelectorAll('svg, .dz-label, .dz-hint').forEach(el => el.style.display = 'none');
}

function resetPreview() {
  const dz = document.getElementById('dz');
  const prev = document.getElementById('dz-preview');
  prev.style.display = 'none'; prev.src = '';
  dz.querySelectorAll('svg, .dz-label, .dz-hint').forEach(el => el.style.display = '');
}

function setupDragDrop() {
  const dz = document.getElementById('dz');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const dt = new DataTransfer(); dt.items.add(f);
    const inp = document.getElementById('file-input');
    inp.files = dt.files;
    previewFile(inp);
  });
}

function setSaving(v) {
  document.getElementById('save-spin').style.display = v ? 'block' : 'none';
  document.getElementById('save-lbl').textContent = v ? 'Saving…' : (editingId ? 'Save Changes' : 'Save Painting');
  document.getElementById('save-btn').disabled = v;
}

function resetSaveBtn() { setSaving(false); }
function setBtnLoading() {}
function set(id, val) { const el = document.getElementById(id); if (el) el.value = val ?? ''; }

function openShopify() {
  const domain = prompt('Shopify store domain (yourstore.myshopify.com):');
  if (domain) window.open(`https://${domain}/admin`, '_blank');
}

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const dotClass = type === 'ok' ? 'dot-green' : type === 'err' ? 'dot-red' : 'dot-amber';
  el.innerHTML = `<span class="dot ${dotClass}"></span>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
</script>
</body>
</html>
